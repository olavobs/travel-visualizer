# Integration test profile.
# Requires: docker compose up -d  (MySQL on localhost:3306, Redis on localhost:6379)
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/flight_monitor?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: flight_user
    password: flight_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false

logging:
  level:
    com.flightmonitor: DEBUG
