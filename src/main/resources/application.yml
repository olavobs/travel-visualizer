spring:
  datasource:
    url: jdbc:mysql://localhost:3306/flight_monitor?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: flight_user
    password: flight_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false  # Disable Redis repositories — we use the cache port directly

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-32-or-more-chars!!}

logging:
  level:
    com.flightmonitor: DEBUG
    org.springframework.jdbc: DEBUG
