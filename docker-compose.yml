services:
  mysql:
    image: mysql:8.0
    container_name: flight_monitor_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: flight_monitor
      MYSQL_USER: flight_user
      MYSQL_PASSWORD: flight_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "flight_user", "-pflight_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: flight_monitor_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build: .
    container_name: flight_monitor_app
    ports:
      - "8080:8080"
    environment:
      # Override application.yml values to use Docker service names as hostnames
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/flight_monitor?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: flight_user
      SPRING_DATASOURCE_PASSWORD: flight_pass
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: flight_monitor_frontend
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  mysql_data:
  redis_data:
